# .github/workflows/skills/build-skill-image.yml
name: Reusable Build Skill Image Workflow

on:
  workflow_call:
    inputs:
      skill:
        required: true
        type: string
      registry:
        type: string
        default: 'docker.io'
    secrets:
      docker-username:
        required: true
      docker-token:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check for Dockerfile
        id: check-dockerfile
        run: |
          if [ -f "${{ inputs.skill }}/Dockerfile" ]; then
            echo "dockerfile-exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile-exists=false" >> $GITHUB_OUTPUT
            echo "No Dockerfile found for skill: ${{ inputs.skill }}"
          fi

      - name: Set up Docker Buildx
        if: steps.check-dockerfile.outputs.dockerfile-exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check-dockerfile.outputs.dockerfile-exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.docker-username }}
          password: ${{ secrets.docker-token }}

      - name: Extract metadata
        if: steps.check-dockerfile.outputs.dockerfile-exists == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/loqalabs/skill-${{ inputs.skill }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        if: steps.check-dockerfile.outputs.dockerfile-exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.skill }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

      - name: Generate SBOM
        if: steps.check-dockerfile.outputs.dockerfile-exists == 'true'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.registry }}/loqalabs/skill-${{ inputs.skill }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ inputs.skill }}.spdx.json

      - name: Upload SBOM
        if: steps.check-dockerfile.outputs.dockerfile-exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-skill-${{ inputs.skill }}
          path: sbom-${{ inputs.skill }}.spdx.json

      - name: Scan container image
        if: steps.check-dockerfile.outputs.dockerfile-exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.registry }}/loqalabs/skill-${{ inputs.skill }}:${{ github.sha }}
          format: 'sarif'
          output: 'container-scan-${{ inputs.skill }}-results.sarif'

      - name: Upload container scan results
        if: always() && steps.check-dockerfile.outputs.dockerfile-exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'container-scan-${{ inputs.skill }}-results.sarif'