name: Reusable Python Test Workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        default: '3.11'
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f dev-requirements.txt ]; then pip install -r dev-requirements.txt; fi

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 .

    - name: Type check with mypy
      run: |
        pip install mypy
        if [ -f mypy.ini ] || [ -f setup.cfg ] || [ -f pyproject.toml ]; then
          mypy .
        else
          echo "No mypy config found; skipping"
        fi

    - name: Run tests
      run: |
        if [ -f pytest.ini ] || grep -q pytest tests/*.py 2>/dev/null; then
          pip install pytest
          pytest
        else
          echo "No pytest config or tests found; skipping"
        fi
