# .github/workflows/skills/test-skill.yml
name: Reusable Test Skill Workflow

on:
  workflow_call:
    inputs:
      skill:
        description: Skill directory
        required: true
        type: string
      go-version:
        type: string
        default: '1.23.0'
      python-version:
        type: string
        default: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        if: hashFiles(format('{0}/go.mod', inputs.skill)) != ''
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Test Go skill
        if: hashFiles(format('{0}/go.mod', inputs.skill)) != ''
        run: |
          cd ${{ inputs.skill }}
          go mod download
          go test -v ./...

      - name: Set up Python
        if: hashFiles(format('{0}/requirements.txt', inputs.skill)) != '' || hashFiles(format('{0}/pyproject.toml', inputs.skill)) != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Test Python skill
        if: hashFiles(format('{0}/requirements.txt', inputs.skill)) != ''
        run: |
          cd ${{ inputs.skill }}
          pip install -r requirements.txt
          python -m pytest tests/ || echo "No tests found"